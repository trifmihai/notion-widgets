<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Video</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#090909}
    body{display:grid;place-items:center;padding:16px;font-family:Inter,system-ui,sans-serif}
    .player{width:min(1120px,100%);background:#000;border-radius:16px;overflow:hidden}
    video{display:block;width:100%;max-height:calc(100vh - 32px);background:#000}
  </style>
</head>
<body>
  <main class="player">
    <video id="video" controls playsinline preload="metadata" src="https://video.gumlet.io/655d712a774b17ed87ac87e2/6a3c89785c2245e4674be3ab/main.mp4"></video>
  </main>
  <script>
    const video=document.getElementById('video');
    const speed=1.5;

    function setSpeed(){
      video.defaultPlaybackRate=speed;
      video.playbackRate=speed;
    }

    setSpeed();
    video.addEventListener('loadedmetadata',setSpeed,{once:true});
    video.addEventListener('play',setSpeed);
  </script>
</body>
</html>
